<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- You can also write your javascript code 
     in an external file
    and link to it in the html head or the body-->
    <script src="script.js" defer></script>
    <!--If you have embedded script and an
    external script file both running code
    The one that runs first is determined by the
    order the code is written in the html file
    but both will run-->

    <!-- You can also run scripts from a cdn or remote server -->


</head>

<body>
    <!-- Because Javascript works on the web, 
     we don't need to download anything to run it

     We can run it directly in the html file or using node.js
      -->


    <!-- To execute javascript code you can do it inside the html file
      using the <script> tag 
        
        usually you leave the script tag at the bottom of the body
     -->
    <script>
        alert("Hello world"); /* This gives you page messages upon opening */
        console.log("Hello world"); /* This writes to the browser console in the inspect panel */
        /* javascript comment tags are the same as CSS */
        /* You can also write your javascript code in an external file
        and link to it in the html head*/
    </script>
    <!-- You can also affect the DOM using javascript -->

    <script src="./backendscript.js"></script>
</body>

</html>
